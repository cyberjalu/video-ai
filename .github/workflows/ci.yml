name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Tailwind CSS
        run: npm run generate:css

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
